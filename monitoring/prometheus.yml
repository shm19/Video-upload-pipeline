global:
  scrape_interval: 5s # how often Prometheus pulls metrics

scrape_configs:
  - job_name: rabbitmq
    static_configs:
      # "rabbitmq" is the compose service name — resolvable on the internal network.
      # 15692 is RabbitMQ's built-in Prometheus /metrics endpoint.
      - targets: ["rabbitmq:15692"]
