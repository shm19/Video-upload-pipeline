services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: vidpipe-rabbit
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI (open in browser: http://localhost:15672)
      - "15692:15692" # Prometheus metrics endpoint (/metrics)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    container_name: vidpipe-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vidpipe
      POSTGRES_PASSWORD: vidpipe
      POSTGRES_DB: vidpipe
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vidpipe"]
      interval: 5s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus
    container_name: vidpipe-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: vidpipe-grafana
    ports:
      - "3001:3000" # 3001 on host so it doesn't clash with the API on 3000
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning

volumes:
  pgdata:
